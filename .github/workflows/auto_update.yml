name: 澳門飲水機數據定時更新

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨自動更新一次
  workflow_dispatch: # 允許手動點擊測試

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 【修正】升級至 v4 最新釋出版本以支援新版 Node.js 執行環境
    - name: 1. 複製專案檔案
      uses: actions/checkout@v4.2.2 

    # 【修正】升級至 v5 最新釋出版本以消除 Node.js 20 的廢棄警告
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: 3. 安裝必要套件
      run: pip install requests

    - name: 4. 執行 Python 抓取並生成 JSON
      run: python update_water.py

    - name: 5. 提交並同步資料檔案
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add water_data.json
        git diff-index --quiet HEAD || (git commit -m "更新飲水機數據資料庫" && git push)
